<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة تحكم المدير - لحظه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #ff6b00;
      --primary-dark: #cc5500;
      --bg: #0a0a0f;
      --bg2: #111118;
      --card: #1a1a24;
      --card2: #22222e;
      --border: rgba(255,107,0,0.15);
      --text: #f0f0f5;
      --text2: #9090aa;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,107,0,0.1);
    }
    .login-logo { font-size: 48px; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
    .login-input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: var(--primary-dark); transform: scale(1.02); }
    .login-err { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* ── MAIN LAYOUT ── */
    #main { display: none; }
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; }
    .topbar-logo .icon { font-size: 28px; }
    .topbar-logo .name { font-size: 20px; font-weight: 900; }
    .topbar-logo .sub { font-size: 12px; color: var(--primary); font-weight: 600; letter-spacing: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .notif-badge {
      background: var(--red);
      color: #fff;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .content { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .s-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-card .s-num { font-size: 28px; font-weight: 900; color: var(--primary); }
    .stat-card .s-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ── NOTIFICATIONS ── */
    .section-title-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title-row h2 { font-size: 18px; font-weight: 900; }
    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    #notifications-list { display: flex; flex-direction: column; gap: 12px; }

    .notif-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 16px;
      animation: slideIn 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .notif-card.new { border-color: var(--primary); }
    .notif-card.new::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 4px; height: 100%;
      background: var(--primary);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .notif-icon {
      font-size: 28px;
      background: rgba(255,107,0,0.1);
      border-radius: 12px;
      padding: 10px;
      min-width: 52px; text-align: center;
    }
    .notif-body { flex: 1; }
    .notif-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .notif-name { font-size: 16px; font-weight: 700; }
    .notif-badge-new {
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 8px;
    }
    .notif-detail { color: var(--text2); font-size: 13px; line-height: 1.6; }
    .notif-detail span { color: var(--text); font-weight: 600; }
    .notif-time { font-size: 11px; color: var(--text2); margin-top: 6px; }
    .notif-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-accept {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-accept:hover { opacity: 0.85; }
    .btn-reject {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reject:hover { background: var(--red); color: #fff; }
    .btn-call {
      background: transparent;
      border: 1px solid var(--blue);
      color: var(--blue);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-call:hover { background: var(--blue); color: #fff; }
    .accepted-label { color: var(--green); font-size: 13px; font-weight: 700; }
    .rejected-label { color: var(--red); font-size: 13px; font-weight: 700; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .e-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── MANUAL REQUEST ── */
    .manual-section {
      margin-top: 32px;
    }
    .manual-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .manual-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-input {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-submit {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .form-submit:hover { background: var(--primary-dark); }

    /* ── SOUND TOGGLE ── */
    .sound-toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      color: var(--text2);
      font-size: 13px;
      user-select: none;
    }
    .toggle-switch {
      width: 36px; height: 20px;
      background: var(--card2);
      border-radius: 10px;
      border: 1px solid var(--border);
      position: relative;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: var(--primary); }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px; right: 2px;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(-16px); }

    @media (max-width: 700px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .content { padding: 16px; }
    }
    @media (max-width: 400px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <div class="login-title">لوحة تحكم المدير</div>
    <div class="login-sub">لحظه — Lahza Admin</div>
    <input type="text" id="admin-user" class="login-input" placeholder="اسم المستخدم"/>
    <input type="password" id="admin-pass" class="login-input" placeholder="كلمة المرور"/>
    <button class="login-btn" onclick="doLogin()">🔐 دخول</button>
    <div class="login-err" id="login-err">❌ اسم المستخدم أو كلمة المرور غلط</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="icon">⚡</div>
      <div>
        <div class="name">لحظه Admin</div>
        <div class="sub">LAHZA DASHBOARD</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-dot"></div>
      <span id="notif-count-badge" class="notif-badge" style="display:none">0 جديد</span>
      <div class="sound-toggle" onclick="toggleSound()">
        <div class="toggle-switch on" id="sound-switch"></div>
        <span id="sound-label">🔔 الصوت</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">خروج ↩</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="s-icon">📋</div>
        <div class="s-num" id="stat-total">0</div>
        <div class="s-lbl">إجمالي الطلبات</div>
      </div>
      <div class="stat-card">
        <div class="s-icon">⏳</div>
        <div class="s-num" id="stat-pending">0</div>
        <div class="s-lbl">في الانتظار</div>
      </div>
      <div class="stat-card">
        <div class="s-icon">✅</div>
        <div class="s-num" id="stat-accepted">0</div>
        <div class="s-lbl">مقبولة</div>
      </div>
      <div class="stat-card">
        <div class="s-icon">❌</div>
        <div class="s-num" id="stat-rejected">0</div>
        <div class="s-lbl">مرفوضة</div>
      </div>
    </div>

    <!-- Notifications -->
    <div class="section-title-row">
      <h2>🔔 طلبات الرحلات</h2>
      <button class="clear-btn" onclick="clearAll()">🗑️ مسح الكل</button>
    </div>
    <div id="notifications-list">
      <div class="empty-state" id="empty-state">
        <div class="e-icon">📭</div>
        <p>لا يوجد طلبات حالياً</p>
      </div>
    </div>

    <!-- Manual Entry -->
    <div class="manual-section">
      <div class="manual-card">
        <h3>➕ إضافة طلب رحلة يدوياً</h3>
        <div class="form-row">
          <input type="text" class="form-input" id="f-name" placeholder="اسم العميل"/>
          <input type="tel" class="form-input" id="f-phone" placeholder="رقم التليفون"/>
        </div>
        <div class="form-row">
          <input type="text" class="form-input" id="f-from" placeholder="من (موقع العميل)"/>
          <input type="text" class="form-input" id="f-to" placeholder="إلى (الوجهة)"/>
        </div>
        <div class="form-row">
          <input type="text" class="form-input" id="f-notes" placeholder="ملاحظات (اختياري)"/>
          <select class="form-input" id="f-type">
            <option value="توصيل أشخاص">🏍️ توصيل أشخاص</option>
          </select>
        </div>
        <button class="form-submit" onclick="addManualRequest()">📨 إضافة الطلب</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── CONFIG ──
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'lahza2025';

  // ── FIREBASE INIT ──
  firebase.initializeApp({
    databaseURL: 'https://saroukh-66bbe-default-rtdb.firebaseio.com/'
  });
  const db = firebase.database();

  // ── STATE ──
  let requestsMap = {};       // Firebase key → request object
  let prevPendingCount = 0;
  let soundOn = true;
  let isLoggedIn = false;

  function getRequestsArray() {
    return Object.entries(requestsMap)
      .map(([key, val]) => ({ ...val, _key: key }))
      .sort((a, b) => a.ts - b.ts);
  }

  // ── FIREBASE REAL-TIME LISTENER ──
  db.ref('requests').on('value', (snapshot) => {
    const data = snapshot.val() || {};
    const newPendingCount = Object.values(data).filter(r => r.status === 'pending').length;
    if (isLoggedIn && newPendingCount > prevPendingCount) playNotifSound();
    prevPendingCount = newPendingCount;
    requestsMap = data;
    if (isLoggedIn) renderAll();
  });

  // ── AUTH ──
  function doLogin() {
    const u = document.getElementById('admin-user').value.trim();
    const p = document.getElementById('admin-pass').value.trim();
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      isLoggedIn = true;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      renderAll();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    isLoggedIn = false;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
  }

  // ── SOUND ──
  function toggleSound() {
    soundOn = !soundOn;
    const sw = document.getElementById('sound-switch');
    sw.classList.toggle('on', soundOn);
    document.getElementById('sound-label').textContent = soundOn ? '🔔 الصوت' : '🔕 الصوت';
  }

  function playNotifSound() {
    if (!soundOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [440, 550, 660].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.3);
      });
    } catch(e) {}
  }

  // ── HELPERS ──
  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'الآن';
    if (diff < 3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
    if (diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
    return `منذ ${Math.floor(diff/86400)} يوم`;
  }

  function updateStats(requests) {
    const total    = requests.length;
    const pending  = requests.filter(r => r.status === 'pending').length;
    const accepted = requests.filter(r => r.status === 'accepted').length;
    const rejected = requests.filter(r => r.status === 'rejected').length;
    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-accepted').textContent = accepted;
    document.getElementById('stat-rejected').textContent = rejected;
    const badge = document.getElementById('notif-count-badge');
    if (pending > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = `${pending} جديد`;
    } else {
      badge.style.display = 'none';
    }
  }

  // ── RENDER ──
  function renderAll() {
    const requests = getRequestsArray();
    const list  = document.getElementById('notifications-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    if (requests.length === 0) {
      list.appendChild(empty);
      updateStats(requests);
      return;
    }

    [...requests].reverse().forEach((req) => {
      const card = document.createElement('div');
      card.className = 'notif-card' + (req.status === 'pending' ? ' new' : '');
      card.id = 'req-' + req._key;

      let actionsHtml = '';
      if (req.status === 'pending') {
        actionsHtml = `
          <div class="notif-actions">
            <button class="btn-accept" onclick="acceptReq('${req._key}')">✅ قبول</button>
            <button class="btn-reject" onclick="rejectReq('${req._key}')">❌ رفض</button>
            <a href="tel:+2${req.phone}" class="btn-call">📞 اتصال</a>
          </div>`;
      } else if (req.status === 'accepted') {
        actionsHtml = `<div class="notif-actions"><span class="accepted-label">✅ تم القبول</span><a href="tel:+2${req.phone}" class="btn-call">📞 اتصال</a></div>`;
      } else {
        actionsHtml = `<div class="notif-actions"><span class="rejected-label">❌ مرفوض</span></div>`;
      }

      card.innerHTML = `
        <div class="notif-icon">🏍️</div>
        <div class="notif-body">
          <div class="notif-top">
            <span class="notif-name">${req.name}</span>
            ${req.status === 'pending' ? '<span class="notif-badge-new">جديد</span>' : ''}
          </div>
          <div class="notif-detail">
            📞 <span>${req.phone}</span> &nbsp;|&nbsp; نوع: <span>${req.type}</span><br/>
            📍 من: <span>${req.from}</span> &nbsp;→&nbsp; إلى: <span>${req.to}</span>
            ${req.notes ? `<br/>📝 <span>${req.notes}</span>` : ''}
          </div>
          <div class="notif-time">🕐 ${timeAgo(req.ts)}</div>
          ${actionsHtml}
        </div>`;
      list.appendChild(card);
    });
    updateStats(requests);
  }

  // ── ACTIONS ──
  function acceptReq(key) {
    db.ref('requests/' + key).update({ status: 'accepted' });
  }

  function rejectReq(key) {
    db.ref('requests/' + key).update({ status: 'rejected' });
  }

  function clearAll() {
    if (confirm('هتمسح كل الطلبات؟')) {
      db.ref('requests').remove();
    }
  }

  function addManualRequest() {
    const name  = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const from  = document.getElementById('f-from').value.trim();
    const to    = document.getElementById('f-to').value.trim();
    const notes = document.getElementById('f-notes').value.trim();
    const type  = document.getElementById('f-type').value;
    if (!name || !phone || !from || !to) {
      alert('من فضلك ادخل الاسم والتليفون والعنوانين');
      return;
    }
    db.ref('requests').push({ name, phone, from, to, notes, type, status: 'pending', ts: Date.now() });
    ['f-name','f-phone','f-from','f-to','f-notes'].forEach(id => document.getElementById(id).value = '');
  }

  // Update time labels every minute
  setInterval(() => { if (isLoggedIn) renderAll(); }, 60000);
</script>
</body>
</html>
